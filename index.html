<!DOCTYPE html>
<html>
<head>
    <title>Exotic's Dark Notes</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Caveat', cursive;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding-bottom: 60px;
        }

        .box {
            background-color: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            min-height: 200px;
            cursor: pointer;
            position: relative;
            background-image: linear-gradient(#252525 1px, transparent 1px);
            background-size: 100% 1.6em;
            line-height: 1.6em;
            white-space: pre-line;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .box:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        .box::before {
            content: "R.I.P";
            color: #444;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5em;
            opacity: 0.3;
            transition: opacity 0.3s ease;
            font-family: 'Caveat', cursive;
            letter-spacing: 3px;
        }

        .revealed-text {
            color: #ff3333;
            position: relative;
            z-index: 1;
            font-size: 1.3em;
            opacity: 0;
            animation: textReveal 0.8s ease-out forwards;
            font-family: 'Patrick Hand', cursive;
            line-height: 1.5;
        }

        .footer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #ff4444;
            font-family: 'Caveat', cursive;
            font-size: 1.4em;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        @keyframes textReveal {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 0.95;
                transform: translateY(0);
            }
        }

        .audio-container {
            position: fixed;
            top: 20px;
            right: 20px;
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }

        .audio-container:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="audio-container">
        <audio controls autoplay loop>
            <source src="4.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <div class="container">
        <div class="box" onclick="revealText(this)"></div>
        <div class="box" onclick="revealText(this)"></div>
        <div class="box" onclick="revealText(this)"></div>
    </div>
    <div class="footer">by exotic</div>

    <script>
        const texts = [
            ``,

            `DC : yassi
пҪҷпҪҒпҪ“пҪҚпҪүпҪҺпјҳпјҗпј пҪҮпҪҚпҪҒпҪүпҪҢпјҺпҪғпҪҸпҪҚ
пјЈпҪҒпҪҚпҪүпҪҺпҪҸ пјіпҪҒпҪҺпҪ”пҪҒ пјўпҪҒпҪ’пҪӮпҪҒпҪ’пҪҒ пј‘пјҗпј’пҪӮ
пј‘пјҳпј•пјҺпј‘пјҷпј•пјҺпј’пј“пј’пјҺпј‘пјҳпјҗ`,

            `DC : packgod_jr1
пҪүпҪ„пҪ…пҪ“пҪ”пҪҸпҪҗпјҷпј‘пј•пј пҪҮпҪҚпҪҒпҪүпҪҢпјҺпҪғпҪҸпҪҚ
пј‘пј—пј”пј” пјҰпҪ…пҪҢпҪҸпҪ“пҪҒ пјӨпҪ’пҪүпҪ–пҪ… пј¬пјЎ 
пј‘пј•пј”пјҺпј’пј–пјҺпј‘пјҳпј•пјҺпјҳпј•`
        ];

        let textIndex = 0;

        function revealText(element) {
            if (!element.dataset.loaded) {
                element.innerHTML = `<span class="revealed-text">${texts[textIndex % texts.length]}</span>`;
                element.dataset.loaded = true;
                textIndex++;
                element.querySelector('.revealed-text').addEventListener('animationend', () => {
                    element.style.backgroundImage = 'none';
                });
            } else {
                element.innerHTML = '';
                delete element.dataset.loaded;
                element.style.backgroundImage = 'linear-gradient(#252525 1px, transparent 1px)';
            }
        }
    </script>
</body>
</html>
